# Raspberry Pi Mulinex - /etc/chrony/chrony.conf
# Configurazione per sincronizzazione da Internet oppure da PC locale

confdir /etc/chrony/conf.d

# ═════════════════════════════════════════════════════════════════
# NTP Sources - Priorità dinamica via mulinex_timesync.sh
# ═════════════════════════════════════════════════════════════════

# DISABILITATI DI DEFAULT (attivati solo se internet disponibile)
# Le pool pubbliche vengono ricaricate da mulinex_timesync.sh se internet OK
pool ntp.ubuntu.com        iburst maxsources 4
pool 0.ubuntu.pool.ntp.org iburst maxsources 1
pool 1.ubuntu.pool.ntp.org iburst maxsources 1
pool 2.ubuntu.pool.ntp.org iburst maxsources 2

# Configurazione dinamica: mulinex_timesync.sh scrive qui il PC locale
# Questo directory viene monitorato e ricaricato automaticamente
sourcedir /etc/chrony/sources.d

# ═════════════════════════════════════════════════════════════════
# Impostazioni di sistema
# ═════════════════════════════════════════════════════════════════

keyfile /etc/chrony/chrony.keys
driftfile /var/lib/chrony/chrony.drift
ntsdumpdir /var/lib/chrony

# Logging completo per debug
logdir /var/log/chrony
log tracking measurements statistics

# Tolleranza per grandi deviazioni (importante al primo boot)
maxupdateskew 100.0

# Sincronizza RTC (Real Time Clock hardware) ogni 11 minuti
rtcsync

# Aggiustamento veloce al primo boot
# Se lo scarto è > 1 secondo, forza lo step (non il slew)
# Solo per i primi 3 aggiornamenti
makestep 1 3

# Leap seconds da timezone database
leapsectz right/UTC
